# wifiscope BSSID aliases — sample config
#
# Copy to ~/.config/wifiscope/aliases.yaml (or set WIFISCOPE_ALIASES env var)
# and replace BSSIDs / labels with your own.
#
# Each entry maps a 5 GHz radio BSSID (the MAC the AP advertises in beacon
# frames) to a friendly name shown by wifiscope. Use the names that make
# sense to you ("1F-bedroom", "office-AP", etc.).
#
# Note: most APs report a *management MAC* in the controller console (e.g.
# H3C AC's "AP列表" table) — that is NOT the same as the radio BSSID.
# H3C's AX51-E series adds an offset of +4 to derive the 5 GHz BSSID from
# the management MAC. AX60 / other models may use a different offset; the
# only fully reliable way is to associate to each AP and let wifiscope's
# `watch` mode print the real BSSID.

# H3C AX51-E series: verified by live capture for AP 2 and AP 4.
# The rule (5 GHz BSSID = mgmt + 4, 2.4 GHz BSSID = mgmt + 1) is a
# property of the AX51-E firmware, not of any one AP, so the four
# AX51-E entries below are all considered verified by extension.
40:fe:95:8a:3c:08: AX51-E_1-B1 (2.4G)      # AP 1 2.4 GHz (mgmt 40:fe:95:8a:3c:07 + 1)
40:fe:95:8a:3c:0b: AX51-E_1-B1 (5G)        # AP 1 5 GHz   (mgmt + 4)
40:fe:95:8a:3c:55: AX51-E_4-B2 (2.4G)      # AP 2 2.4 GHz (mgmt 40:fe:95:8a:3c:54 + 1)
40:fe:95:8a:3c:58: AX51-E_4-B2 (5G)        # AP 2 5 GHz   (mgmt + 4)
40:fe:95:8a:3c:16: AX51-E_5-3F (2.4G)      # AP 3 2.4 GHz (mgmt 40:fe:95:8a:3c:15 + 1)
40:fe:95:8a:3c:19: AX51-E_5-3F (5G)        # AP 3 5 GHz   (mgmt + 4)
40:fe:95:89:c7:e0: AX51-E_3-2F (2.4G)      # AP 4 2.4 GHz (mgmt 40:fe:95:89:c7:df + 1)  -- live-verified
40:fe:95:89:c7:e3: AX51-E_3-2F (5G)        # AP 4 5 GHz   (mgmt + 4)                    -- live-verified

# H3C AX60_2: different chipset, offset rule unknown. Leave commented;
# walk near AX60_2 and let wifiscope's watch mode print the BSSID,
# then move the line above the comment block.
# bc:22:47:ca:79:??: AX60_2 (2.4G)         # mgmt bc:22:47:ca:79:46 + ?
# bc:22:47:ca:79:??: AX60_2 (5G)           # mgmt + ?
