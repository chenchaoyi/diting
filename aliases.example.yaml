# wifiscope BSSID aliases — sample config
#
# Copy to ~/.config/wifiscope/aliases.yaml (or set WIFISCOPE_ALIASES env var)
# and replace BSSIDs / labels with your own.
#
# Each entry maps a 5 GHz radio BSSID (the MAC the AP advertises in beacon
# frames) to a friendly name shown by wifiscope. Use the names that make
# sense to you ("1F-bedroom", "office-AP", etc.).
#
# Note: most APs report a *management MAC* in the controller console (e.g.
# H3C AC's "AP列表" table) — that is NOT the same as the radio BSSID.
# H3C's AX51-E series adds an offset of +4 to derive the 5 GHz BSSID from
# the management MAC. AX60 / other models may use a different offset; the
# only fully reliable way is to associate to each AP and let wifiscope's
# `watch` mode print the real BSSID.

# Verified — observed live in `wifiscope watch`. AX51-E series confirms
# the rule: 5 GHz BSSID = mgmt MAC + 4, 2.4 GHz BSSID = mgmt MAC + 1.
40:fe:95:8a:3c:58: AX51-E_4-B2 (5G)        # AP 2 5 GHz
40:fe:95:89:c7:e3: AX51-E_3-2F (5G)        # AP 4 5 GHz
40:fe:95:89:c7:e0: AX51-E_3-2F (2.4G)      # AP 4 2.4 GHz

# Unverified — predicted from the +4 / +1 rule. Confirm by walking
# near each AP and updating if wrong.
# 40:fe:95:8a:3c:0b: AX51-E_1-B1 (5G)      # AP 1 5 GHz   (mgmt 40:fe:95:8a:3c:07 + 4)
# 40:fe:95:8a:3c:08: AX51-E_1-B1 (2.4G)    # AP 1 2.4 GHz (mgmt + 1)
# 40:fe:95:8a:3c:19: AX51-E_5-3F (5G)      # AP 3 5 GHz   (mgmt 40:fe:95:8a:3c:15 + 4)
# 40:fe:95:8a:3c:16: AX51-E_5-3F (2.4G)    # AP 3 2.4 GHz (mgmt + 1)
# bc:22:47:ca:79:4a: AX60_2 (5G)           # AP 5 5 GHz   (mgmt bc:22:47:ca:79:46 + 4 — uncertain, different chipset)
# bc:22:47:ca:79:47: AX60_2 (2.4G)         # AP 5 2.4 GHz (mgmt + 1 — uncertain)
