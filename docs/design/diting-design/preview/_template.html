<!doctype html><html><head><meta charset="utf-8">
<title>card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-window);}
  .card{padding:18px 22px;display:flex;flex-direction:column;gap:10px;min-height:114px;}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .swatch{width:120px;height:64px;border-radius:2px;display:flex;align-items:flex-end;justify-content:space-between;padding:6px 8px;font-size:11px;color:#000;font-family:var(--font-mono);}
  .swatch.dark{color:var(--fg1);}
  .lbl{display:flex;flex-direction:column;font-family:var(--font-mono);font-size:11px;line-height:1.3;}
  .lbl b{color:var(--fg1);font-weight:700;}
  .lbl span{color:var(--fg-dim);}
  .panel-demo{border:1px solid var(--brand-orange);background:var(--bg-panel);position:relative;padding:14px 16px;color:var(--fg2);font-family:var(--font-mono);font-size:14px;}
  .panel-demo > .pt{position:absolute;top:-9px;left:14px;background:var(--bg-window);color:var(--brand-orange);font-size:12px;font-weight:700;padding:0 6px;}
  .kbd{font-family:var(--font-mono);font-size:12px;padding:2px 7px;background:var(--bg-row-alt);color:var(--fg1);border:1px solid rgba(255,255,255,.08);}
  .meter{display:inline-flex;gap:2px;}
  .meter i{width:10px;height:14px;display:block;}
  .tag{font-family:var(--font-mono);font-size:12px;background:var(--bg-row-alt);color:var(--fg1);padding:2px 8px;}
  .pill{font-family:var(--font-mono);font-size:11px;border-radius:999px;padding:2px 8px;}
</style>
</head><body><div class="card">__BODY__</div></body></html>
