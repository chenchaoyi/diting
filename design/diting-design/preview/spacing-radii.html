<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0;background:var(--bg-window);}
.wrap{padding:16px 20px;}
.row{display:flex;gap:8px;align-items:stretch;flex-wrap:wrap;}
.col{display:flex;flex-direction:column;gap:8px;}
.sw{width:108px;height:60px;border-radius:2px;position:relative;display:flex;align-items:flex-end;padding:6px 8px;font:11px var(--font-mono);}
.sw .lbl{position:absolute;left:8px;top:6px;font:11px var(--font-mono);}
.sw .hex{font:11px var(--font-mono);}
.cap{font:11px var(--font-mono);color:var(--fg-dim);}
.tagrow{display:flex;gap:6px;flex-wrap:wrap;}
.kbd{font:12px var(--font-mono);padding:3px 8px;background:var(--bg-row-alt);color:var(--fg1);border:1px solid rgba(255,255,255,.08);}
.tag{font:12px var(--font-mono);background:var(--bg-row-alt);color:var(--fg1);padding:3px 8px;letter-spacing:.02em;}
.panelDemo{border:1px solid var(--brand-orange);background:var(--bg-panel);position:relative;padding:14px 16px 12px;color:var(--fg2);font:13px/1.55 var(--font-mono);min-height:60px;}
.panelDemo .pt{position:absolute;top:-9px;left:14px;background:var(--bg-window);color:var(--brand-orange);font:600 12px var(--font-mono);padding:0 6px;}
.spec{display:flex;align-items:baseline;gap:18px;font-family:var(--font-mono);}
.spec .name{color:var(--fg-dim);font-size:11px;width:74px;}
.spec .val{color:var(--fg1);}
.dot{width:14px;height:14px;border-radius:999px;display:inline-block;}
.metercell{width:10px;height:18px;display:inline-block;}
</style></head><body><div class="wrap">
<div class="row" style="align-items:center;gap:14px;">
  <div style="width:64px;height:48px;background:var(--bg-row-alt);border-radius:0;border:1px solid var(--brand-orange);"></div>
  <div style="width:64px;height:48px;background:var(--bg-row-alt);border-radius:2px;"></div>
  <div style="width:64px;height:48px;background:var(--bg-row-alt);border-radius:4px;"></div>
  <div style="width:64px;height:48px;background:var(--bg-row-alt);border-radius:8px;"></div>
  <div style="width:48px;height:48px;background:var(--bg-row-alt);border-radius:999px;"></div>
</div>
<div class="row" style="margin-top:6px;font:11px var(--font-mono);color:var(--fg-dim);gap:38px;">
  <span>panel · 0</span><span>r-sm · 2</span><span>r-md · 4</span><span>r-lg · 8</span><span>r-pill</span>
</div>
<div class="cap" style="margin-top:8px;">Panels are square. <code>r-lg</code> reserved for the macOS window only.</div></div></body></html>
